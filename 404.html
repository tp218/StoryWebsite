<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        const repoName = '/StoryWebsite';
        const currentPath = window.location.pathname;
        if (!currentPath.startsWith(repoName)) {
          const newUrl = repoName + currentPath + window.location.search + window.location.hash;
          window.location.replace(newUrl);
        }
      })();
    </script>
  </head>
  <body></body>
</html>
